cat > k8s/secrets/secrets-template.yaml << 'EOF'
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: ecommerce
type: Opaque
data:
  MONGO_URI: <base64-encoded>
  UPSTASH_REDIS_URL: <base64-encoded>
  ACCESS_TOKEN_SECRET: <base64-encoded>
  REFRESH_TOKEN_SECRET: <base64-encoded>
  CLOUDINARY_CLOUD_NAME: <base64-encoded>
  CLOUDINARY_API_KEY: <base64-encoded>
  CLOUDINARY_API_SECRET: <base64-encoded>
  STRIPE_SECRET_KEY: <base64-encoded>
EOF